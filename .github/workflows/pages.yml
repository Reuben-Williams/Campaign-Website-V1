name: Deploy Next.js static export

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          PUBLISH_BASE_PATH: /Campaign-Website-V1
          NEXT_PUBLIC_SITE_URL: https://moralesforassembly.com

      - name: Add nojekyll marker
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
